  <!-- CARDINALITÉS (près des entités) -->
  <text x="298" y="163" text-anchor="middle" font-size="11" font-style="italic" fill="black">(1,n)</text>
  <text x="155" y="285" text-anchor="middle" font-size="11" font-style="italic" fill="black">(1,1)</text>
  <text x="122" y="387" text-anchor="middle" font-size="11" font-style="italic" fill="black">(0,n)</text>
  <text x="263" y="482" text-anchor="middle" font-size="11" font-style="italic" fill="black">(1,1)</text>
  <text x="530" y="412" text-anchor="middle" font-size="11" font-style="italic" fill="black">(0,n)</text>
  <text x="435" y="482" text-anchor="middle" font-size="11" font-style="italic" fill="black">(1,1)</text>
  <text x="363" y="614" text-anchor="start" font-size="11" font-style="italic" fill="black">(0,1)</text>
  <text x="363" y="714" text-anchor="start" font-size="11" font-style="italic" fill="black">(1,1)</text>

